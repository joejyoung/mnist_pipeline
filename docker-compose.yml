services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: mnist
      POSTGRES_PASSWORD: mnist
      POSTGRES_DB: experiments
    ports:
      - "5432:5432"          # native WSL2 scripts connect via localhost:5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mnist"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Real world: managed MLflow / W&B / SageMaker registry
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    command: >
      mlflow server
      --backend-store-uri postgresql://mnist:mnist@db:5432/experiments
      --default-artifact-root mlflow-artifacts:/
      --artifacts-destination /mlartifacts
      --serve-artifacts
      --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"
    volumes:
      - mlartifacts:/mlartifacts
    depends_on:
      db:
        condition: service_healthy

  # Real world: TorchServe/Triton behind a load balancer
  api:
    build: ./serving
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://mnist:mnist@db:5432/experiments
      MODEL_PATH: /models/model.onnx
    volumes:
      - ./models:/models:ro    # promoted ONNX artifact mounted read-only
    depends_on:
      db:
        condition: service_healthy

  # Real world: Grafana + ML observability (Evidently/Arize)
  dashboard:
    build: ./dashboard
    ports:
      - "8501:8501"
    environment:
      DATABASE_URL: postgresql://mnist:mnist@db:5432/experiments
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  mlartifacts:
